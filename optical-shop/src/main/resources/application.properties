# ─────────────────────────────────────────────
# Server
# ─────────────────────────────────────────────
server.port=8080

# ─────────────────────────────────────────────
# DataSource — MSSQL trên Docker
# ─────────────────────────────────────────────
spring.datasource.url=jdbc:sqlserver://localhost:1434;databaseName=optical_shop;encrypt=true;trustServerCertificate=true
spring.datasource.username=sa
spring.datasource.password=OpticalShop@123
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# ─────────────────────────────────────────────
# JPA / Hibernate
# ─────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ─────────────────────────────────────────────
# JWT
# ─────────────────────────────────────────────
app.jwt.secret=optical-shop-super-secret-key-change-me-in-prod
app.jwt.expiration-ms=86400000

# ─────────────────────────────────────────────
# Swagger
# ─────────────────────────────────────────────
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
